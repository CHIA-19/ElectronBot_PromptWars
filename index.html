<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security: Content Security Policy to prevent XSS and injection attacks -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:;" />

    <!-- SEO Meta Tags -->
    <title>ElectionBot — Your Civic Education Assistant</title>
    <meta name="description" content="ElectionBot is a nonpartisan civic education assistant that helps voters register, find polling places, and understand election timelines. Powered by Google Civic Information API, Google Maps, and AI." />
    <meta name="keywords" content="voter registration, polling place, election, civic education, vote, democracy, election bot, AI assistant" />
    <meta name="author" content="ElectionBot" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ElectionBot — Your Civic Education Assistant" />
    <meta property="og:description" content="Get nonpartisan election help: voter registration, polling locations, and election timelines — all powered by AI and Google services." />
    <meta property="og:url" content="https://craftverse-6ce15.web.app" />

    <!-- Accessibility & Performance -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="dark" />

    <!-- Google Fonts: Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root" role="application" aria-label="ElectionBot Civic Assistant"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
